spring.application.name=backend
server.port=8080

# Supabase PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://db.eflvdsfxbtwintisqpei.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT — set JWT_SECRET env var to a Base64-encoded or raw string of >= 32 bytes
# Startup will FAIL (intentionally) if the secret is absent or too short.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# CORS — override for production deployments (comma-separated)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
